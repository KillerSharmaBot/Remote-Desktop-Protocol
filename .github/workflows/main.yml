- name: Start Chrome Remote Desktop Host
  continue-on-error: true
  run: |
    $paths = @(
      "${Env:PROGRAMFILES(X86)}\Google\Chrome Remote Desktop\CurrentVersion\remoting_start_host.exe",
      "${Env:PROGRAMFILES}\Google\Chrome Remote Desktop\CurrentVersion\remoting_start_host.exe"
    )
    foreach ($path in $paths) {
      if (Test-Path $path) {
        & $path --code="${{ inputs.code }}" --redirect-url="https://remotedesktop.google.com/_/oauthredirect" --pin="123456" --name="GitHubActions-Host"
        break
      }
    }
