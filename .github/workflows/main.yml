name: SAY GEX

on:
  workflow_dispatch:
    inputs:
      code:
        description: PAY GORN
        required: true

jobs:
  build:
    name: SAYGEXPAYGORN
    runs-on: windows-latest

    steps:
    - name: Disable Firewall Profiles
      run: |
        Set-NetFirewallProfile -Profile Domain,Public,Private -Enabled False

    - name: Install Necessary Packages
      run: |
        choco install chrome-remote-desktop-host -y --ignore-checksums
        choco install googlechrome -y --ignore-checksums

    - name: Download MEmu from MediaFire
      run: |
        $url = "https://www.mediafire.com/file/1y09ydbfi281fef/MEmu_Emulator.exe/file"
        $response = Invoke-WebRequest -Uri $url -UseBasicParsing
        $downloadUrl = ($response.Links | Where-Object { $_.href -like "*.mediafire.com/download/*" }).href | Select-Object -First 1
        if (-not $downloadUrl) {
          $content = $response.Content
          if ($content -match 'https?://download\d+\.mediafire\.com/[^"\s]+') {
            $downloadUrl = $matches[0]
          }
        }
        if ($downloadUrl) {
          Invoke-WebRequest -Uri $downloadUrl -OutFile "$env:TEMP\MEmu_Emulator.exe" -UserAgent [Microsoft.PowerShell.Commands.PSUserAgent]::Chrome
          Write-Host "MEmu downloaded successfully"
        } else {
          Write-Host "Failed to get download link"
          exit 1
        }

    - name: Install MEmu (Silent)
      run: |
        $installer = "$env:TEMP\MEmu_Emulator.exe"
        if (Test-Path $installer) {
          Start-Process -FilePath $installer -ArgumentList "/S" -Wait
          Write-Host "MEmu installation completed"
        } else {
          Write-Host "MEmu installer not found"
        }

    - name: Start Chrome Remote Desktop
      continue-on-error: true
      run: |
        $paths = @(
          "${Env:PROGRAMFILES(X86)}\Google\Chrome Remote Desktop\CurrentVersion\remoting_start_host.exe",
          "${Env:PROGRAMFILES}\Google\Chrome Remote Desktop\CurrentVersion\remoting_start_host.exe"
        )
        foreach ($path in $paths) {
          if (Test-Path $path) {
            & $path
            break
          }
        }

    - name: Start Remote Desktop Session
      continue-on-error: true
      run: |
        ${{ inputs.code }} --pin=123456

    - name: Keep Connection Active
      run: |
        $i = 8080
        while ($i -gt 0) {
          Write-Host $i
          Start-Sleep 60
          $i--
        }
