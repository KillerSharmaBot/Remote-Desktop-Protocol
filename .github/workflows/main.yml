name: Chrome Remote Desktop Host

on:
  workflow_dispatch:
    inputs:
      auth_code:
        description: 'Google CRD Auth Code (4/0Aci98E-xxxx format) - Get from https://remotedesktop.google.com/headless'
        required: true

jobs:
  setup_remote_desktop:
    name: Setup Chrome Remote Desktop
    runs-on: windows-latest
    timeout-minutes: 360

    steps:
    - name: Disable Windows Firewall
      run: |
        Set-NetFirewallProfile -Profile Domain,Public,Private -Enabled False

    - name: Install Chrome Remote Desktop Host
      run: |
        choco install chrome-remote-desktop-host -y --ignore-checksums

    - name: Install Google Chrome
      run: |
        choco install googlechrome -y --ignore-checksums

    - name: Start Chrome Remote Desktop
      run: |
        $code = "${{ inputs.auth_code }}"
        $exePath = "${Env:PROGRAMFILES(X86)}\Google\Chrome Remote Desktop\CurrentVersion\remoting_start_host.exe"
        
        if (-not (Test-Path $exePath)) {
            $exePath = "${Env:PROGRAMFILES}\Google\Chrome Remote Desktop\CurrentVersion\remoting_start_host.exe"
        }
        
        Write-Host "Starting Chrome Remote Desktop..."
        Write-Host "Computer Name: $Env:COMPUTERNAME"
        
        & $exePath --code="$code" --redirect-url="https://remotedesktop.google.com/_/oauthredirect" --display-name="$Env:COMPUTERNAME" --pin=123456
        
        Write-Host "Chrome Remote Desktop started successfully with PIN: 123456"

    - name: Keep Connection Active
      run: |
        Write-Host ""
        Write-Host "============================================"
        Write-Host "REMOTE DESKTOP IS ACTIVE"
        Write-Host "============================================"
        Write-Host "1. Go to: https://remotedesktop.google.com/access"
        Write-Host "2. Login with SAME Google account"
        Write-Host "3. Find computer: $Env:COMPUTERNAME"
        Write-Host "4. Enter PIN: 123456"
        Write-Host "============================================"
        Write-Host ""
        
        $minutes = 120
        for ($i = $minutes; $i -gt 0; $i--) {
            Write-Host "[$(Get-Date -Format 'HH:mm:ss')] Active - $i minutes remaining"
            Start-Sleep -Seconds 60
        }
