name: Chrome Remote Desktop Setup

on:
  workflow_dispatch:
    inputs:
      code:
        description: Chrome Remote Desktop Authorization Code
        required: true
        type: string

jobs:
  setup-remote-desktop:
    name: Setup Windows Remote Desktop Host
    runs-on: windows-latest

    steps:
    - name: Disable Windows Firewall
      run: |
        Set-NetFirewallProfile -Profile Domain,Public,Private -Enabled False

    - name: Install Required Software
      run: |
        choco install chrome-remote-desktop-host -y --ignore-checksums
        choco install googlechrome -y --ignore-checksums

    - name: Start Chrome Remote Desktop Service
      continue-on-error: true
      run: |
        $paths = @(
          "${Env:PROGRAMFILES(X86)}\Google\Chrome Remote Desktop\CurrentVersion\remoting_start_host.exe",
          "${Env:PROGRAMFILES}\Google\Chrome Remote Desktop\CurrentVersion\remoting_start_host.exe"
        )
        foreach ($path in $paths) {
          if (Test-Path $path) {
            & $path --code="${{ inputs.code }}" --redirect-url="https://remotedesktop.google.com/_/oauthredirect" --pin="123456"
            break
          }
        }

    - name: Keep Connection Alive
      run: |
        $countdown = 8080
        while ($countdown -gt 0) {
          Write-Host "Time remaining: $countdown seconds"
          Start-Sleep 60
          $countdown--
        }
